<!DOCTYPE html>
<html>
<head>
  <title>3D Platform Game Complete</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="hud">Score: 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let keys = {};

let velocityY = 0;
let onGround = true;

let isSpinning = false;
let spinTimer = 0;
let spinCooldown = 0;

let score = 0;
const hud = document.getElementById("hud");

const enemies = [];
const fruits = [];
const platforms = [];
const crates = [];

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(10,20,10);
  scene.add(light);

  // ===== PLAYER =====
  const player = new THREE.Group();

  const skin = new THREE.MeshStandardMaterial({ color: 0xff8844 });
  const dark = new THREE.MeshStandardMaterial({ color: 0x333333 });

  const body = new THREE.Mesh(new THREE.BoxGeometry(1,1.5,0.8), skin);
  body.position.y = 1.2;
  player.add(body);

  const head = new THREE.Mesh(new THREE.BoxGeometry(1.2,1.2,1), skin);
  head.position.y = 2.5;
  player.add(head);

  const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.8,0.3), skin);
  const rightArm = leftArm.clone();
  leftArm.position.set(-0.9,1.4,0);
  rightArm.position.set(0.9,1.4,0);
  player.add(leftArm);
  player.add(rightArm);

  const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.8,0.4), dark);
  const rightLeg = leftLeg.clone();
  leftLeg.position.set(-0.3,0.4,0);
  rightLeg.position.set(0.3,0.4,0);
  player.add(leftLeg);
  player.add(rightLeg);

  player.userData = { leftArm, rightArm, leftLeg, rightLeg };

  scene.add(player);
  window.player = player;

  // ===== GROUND =====
  const ground = new THREE.Mesh(
    new THREE.BoxGeometry(60,1,60),
    new THREE.MeshStandardMaterial({ color: 0x228B22 })
  );
  ground.position.y = -0.5;
  scene.add(ground);

  // ===== MOVING PLATFORMS =====
  function createPlatform(x,y,z){
    const p = new THREE.Mesh(
      new THREE.BoxGeometry(3,0.5,3),
      new THREE.MeshStandardMaterial({ color: 0x888888 })
    );
    p.position.set(x,y,z);
    p.userData = { baseY: y, t: Math.random()*100 };
    platforms.push(p);
    scene.add(p);
  }

  createPlatform(5,2,-5);
  createPlatform(-5,3,-10);
  createPlatform(10,4,-15);

  // ===== ENEMIES =====
  for (let i=0;i<5;i++){
    const e = new THREE.Mesh(
      new THREE.BoxGeometry(1,1,1),
      new THREE.MeshStandardMaterial({ color: 0xff0000 })
    );

    e.position.set((Math.random()-0.5)*20,0.5,(Math.random()-0.5)*20);
    e.userData = { alive:true, dir:Math.random()*Math.PI*2 };

    enemies.push(e);
    scene.add(e);
  }

  // ===== FRUIT =====
  for (let i=0;i<12;i++){
    const f = new THREE.Mesh(
      new THREE.SphereGeometry(0.3,8,8),
      new THREE.MeshStandardMaterial({ color: 0xffcc00 })
    );

    f.position.set((Math.random()-0.5)*25,1,(Math.random()-0.5)*25);
    fruits.push(f);
    scene.add(f);
  }

  // ===== CRATES =====
  function createCrate(x,y,z,type){
    const color =
      type==="tnt" ? 0xff0000 :
      type==="bounce" ? 0x00aaff : 0x8B4513;

    const c = new THREE.Mesh(
      new THREE.BoxGeometry(1,1,1),
      new THREE.MeshStandardMaterial({ color })
    );

    c.position.set(x,y,z);
    c.userData = { type, alive:true, timer:-1 };

    crates.push(c);
    scene.add(c);
  }

  createCrate(3,0.5,-3,"wood");
  createCrate(6,0.5,-6,"bounce");
  createCrate(-4,0.5,-8,"tnt");
  createCrate(10,0.5,-12,"wood");

  camera.position.set(0,3,7);

  window.addEventListener("keydown", e => keys[e.code]=true);
  window.addEventListener("keyup", e => keys[e.code]=false);
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  const p = window.player;

  if (spinCooldown>0) spinCooldown--;

  let moving=false;
  const speed = isSpinning ? 0.15 : 0.1;

  if (keys["KeyA"]) { p.position.x -= speed; moving=true; }
  if (keys["KeyD"]) { p.position.x += speed; moving=true; }
  if (keys["KeyW"]) { p.position.z -= speed; moving=true; }
  if (keys["KeyS"]) { p.position.z += speed; moving=true; }

  if (keys["Space"] && onGround){
    velocityY=0.25;
    onGround=false;
  }

  if (keys["KeyQ"] && !isSpinning && spinCooldown===0){
    isSpinning=true;
    spinTimer=25;
    spinCooldown=50;
  }

  velocityY -= 0.012;
  p.position.y += velocityY;

  if (p.position.y<0){
    p.position.y=0;
    velocityY=0;
    onGround=true;
  }

  // ===== MOVING PLATFORMS =====
  platforms.forEach(pl=>{
    pl.userData.t += 0.02;
    pl.position.y = pl.userData.baseY + Math.sin(pl.userData.t)*0.8;
  });

  // ===== ENEMIES =====
  enemies.forEach(e=>{
    if(!e.userData.alive) return;

    e.userData.dir += (Math.random()-0.5)*0.05;
    e.position.x += Math.cos(e.userData.dir)*0.03;
    e.position.z += Math.sin(e.userData.dir)*0.03;

    if(isSpinning && e.position.distanceTo(p.position)<1.5){
      e.userData.alive=false;
      scene.remove(e);
      score+=5;
    }
  });

  // ===== FRUIT =====
  fruits.forEach(f=>{
    if(!f.visible) return;

    if(f.position.distanceTo(p.position)<1.2){
      f.visible=false;
      scene.remove(f);
      score++;
    }
  });

  // ===== CRATES =====
  crates.forEach(c=>{
    if(!c.userData.alive) return;

    const d = c.position.distanceTo(p.position);

    // spin break
    if(isSpinning && d<1.5){
      if(c.userData.type!=="tnt"){
        c.userData.alive=false;
        scene.remove(c);
        score+=2;
      }
      if(c.userData.type==="tnt"){
        c.userData.timer=30;
      }
    }

    // bounce
    if(c.userData.type==="bounce" && d<1.2){
      velocityY=0.35;
    }

    // TNT explode
    if(c.userData.type==="tnt" && c.userData.timer>0){
      c.userData.timer--;
      c.material.color.set(0xffff00);

      if(c.userData.timer===0){
        c.userData.alive=false;
        scene.remove(c);

        if(d<4){
          velocityY=0.2;
        }
      }
    }
  });

  // ===== SPIN =====
  if(isSpinning){
    p.rotation.y += 0.6;
    p.translateZ(-0.05);
    spinTimer--;

    if(spinTimer<=0) isSpinning=false;
  } else {
    p.rotation.y *= 0.9;
  }

  // ===== RUN =====
  if(moving && onGround && !isSpinning){
    const t=Date.now()*0.01;
    const s=Math.sin(t)*0.6;

    p.userData.leftLeg.rotation.x=s;
    p.userData.rightLeg.rotation.x=-s;
    p.userData.leftArm.rotation.x=-s;
    p.userData.rightArm.rotation.x=s;
  }

  hud.innerText = "Score: " + score;

  // camera
  camera.position.x = p.position.x;
  camera.position.y = p.position.y + 3;
  camera.position.z = p.position.z + 7;
  camera.lookAt(p.position);

  renderer.render(scene,camera);
}
</script>

</body>
</html>
